spring:
  application:
    name: spring-babel-rag
  config:
    import: optional:file:.env[.properties]

blog-write-agent:
  outputDir: blog-posts

# Konfiguracja polityki retry
retry-policy:
  # Maksymalna liczba ponownych prób dla błędów przejściowych
  max-retries: 3
  # Początkowe opóźnienie między próbami (w milisekundach)
  initial-delay-ms: 1000
  # Mnożnik dla exponential backoff (np. 2.0 oznacza podwojenie czasu czekania)
  backoff-multiplier: 2.0

embabel:
  agent:
    platform:
      models:
        openai:
          api-key: ${OPENAI_API_KEY}
      toolloop:
        max-iteration: 8
  models:
    default-llm: gpt-5-mini
    llms:
      editor: gpt-4o
      reviewer: gpt-5-mini