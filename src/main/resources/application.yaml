spring:
  application:
    name: spring-babel-rag
  config:
    import: optional:file:.env[.properties]
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  # Timeout dla wychodzących zapytań HTTP (Spring Boot 3.2+)
  # Zwiększony do 3 minut dla długich odpowiedzi LLM (Linker, Reviewer)
  http:
    client:
      read-timeout: 3m
      connect-timeout: 10s

blog-write-agent:
  outputDir: blog-posts

# Konfiguracja polityki retry (nasz ResilientExecutor)
retry-policy:
  # Maksymalna liczba ponownych prób dla błędów przejściowych (np. sieciowych)
  # UWAGA: Embabel ma własny retry (do 10x) - nasz jest ostatnią linią obrony
  max-retries: 2
  # Początkowe opóźnienie między próbami (w milisekundach)
  initial-delay-ms: 2000
  # Mnożnik dla exponential backoff
  backoff-multiplier: 2.0

embabel:
  agent:
    platform:
      models:
        openai:
          api-key: ${OPENAI_API_KEY}
        anthropic:
          api-key: ${ANTHROPIC_API_KEY}
        ollama:
          # Odczyt modeli z /api/tags i rejestracja beanow typu ollamaModel-<model>
          base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      toolloop:
        max-iterations: 3
      llm-operations:
        prompts:
          # Globalny timeout pojedynczego wywołania LLM dla wszystkich agentów
          default-timeout: 240s
  models:
    default-llm: gpt-5-mini
    llms:
      developer: claude-sonnet-4-5
      translator: gpt-4o-mini
      editor_pl: gpt-5-mini
      reviewer: claude-sonnet-4-5
      linker: gpt-4o-mini
      md_expert: claude-haiku-4-5
